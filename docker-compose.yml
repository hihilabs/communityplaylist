services:
  cp-local:
    build: .
    restart: unless-stopped
    env_file: .env
    command: >
      gunicorn communityplaylist.wsgi:application
      --bind 0.0.0.0:8000
      --workers 2
      --timeout 60
      --reload
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - ./media:/app/media
      - ./templates:/app/templates
      - ./static:/app/static
      - ./communityplaylist:/app/communityplaylist
      - ./events:/app/events
      - ./board:/app/board
      - ./social:/app/social
      - ./wiki:/app/wiki
      - ./manage.py:/app/manage.py
    labels:
      - "traefik.enable=true"
      # local.communityplaylist.com — main app
      - "traefik.http.routers.cp-local.rule=Host(`local.communityplaylist.com`)"
      - "traefik.http.routers.cp-local.entrypoints=websecure"
      - "traefik.http.routers.cp-local.tls=true"
      - "traefik.http.services.cp-local.loadbalancer.server.port=8000"
      # wiki.communityplaylist.com — genre wiki (prefix /wiki before forwarding)
      - "traefik.http.routers.cp-wiki.rule=Host(`wiki.communityplaylist.com`)"
      - "traefik.http.routers.cp-wiki.entrypoints=websecure"
      - "traefik.http.routers.cp-wiki.tls=true"
      - "traefik.http.routers.cp-wiki.service=cp-local"
      - "traefik.http.routers.cp-wiki.middlewares=wiki-prefix"
      - "traefik.http.middlewares.wiki-prefix.addprefix.prefix=/wiki"
    networks:
      - traefik

networks:
  traefik:
    external: true
