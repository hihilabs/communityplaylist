services:
  cp-local:
    build: .
    restart: unless-stopped
    env_file: .env
    command: >
      gunicorn communityplaylist.wsgi:application
      --bind 0.0.0.0:8000
      --workers 2
      --timeout 60
      --reload
    volumes:
      - ./.env:/app/.env:ro
      - ./db.sqlite3:/app/db.sqlite3
      - ./media:/app/media
      - ./templates:/app/templates
      - ./static:/app/static
      - ./communityplaylist:/app/communityplaylist
      - ./events:/app/events
      - ./board:/app/board
      - ./social:/app/social
      - ./wiki:/app/wiki
      - ./ops:/app/ops
      - ./manage.py:/app/manage.py
    labels:
      - "traefik.enable=true"
      # local.communityplaylist.com — main app
      - "traefik.http.routers.cp-local.rule=Host(`local.communityplaylist.com`)"
      - "traefik.http.routers.cp-local.entrypoints=websecure"
      - "traefik.http.routers.cp-local.tls=true"
      - "traefik.http.services.cp-local.loadbalancer.server.port=8000"
      # wiki.communityplaylist.com — genre wiki (host middleware switches urlconf to root)
      - "traefik.http.routers.cp-wiki.rule=Host(`wiki.communityplaylist.com`)"
      - "traefik.http.routers.cp-wiki.entrypoints=websecure"
      - "traefik.http.routers.cp-wiki.tls=true"
      - "traefik.http.routers.cp-wiki.service=cp-local"
    networks:
      - traefik

  wiki-cron:
    build: .
    restart: unless-stopped
    env_file: .env
    command: python /app/wiki/management/commands/wiki_cron_runner.py
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - ./wiki:/app/wiki
      - ./ops:/app/ops
      - ./manage.py:/app/manage.py
      - ./communityplaylist:/app/communityplaylist
      - ./events:/app/events
      - ./board:/app/board
      - ./social:/app/social
    networks:
      - traefik

  vite:
    image: node:22-alpine
    working_dir: /app/frontend
    command: npm run dev -- --host
    volumes:
      - .:/app
    ports:
      - "5174:5173"
    networks:
      - traefik

networks:
  traefik:
    external: true
