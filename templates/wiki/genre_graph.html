{% extends 'wiki/base.html' %}

{% block title %}Genre Web — Community Playlist{% endblock %}

{% block extra_head %}
<style>
  body { overflow: hidden; }
  .container { padding: 0; max-width: none; }
  footer { display: none; }

  #graph-wrap {
    position: fixed; inset: 56px 0 0 0;
    background: var(--bg);
    overflow: hidden;
  }

  #graph-svg { width: 100%; height: 100%; cursor: grab; }
  #graph-svg:active { cursor: grabbing; }

  /* ── Node styles ──────────────────────────────────────── */
  .g-node circle {
    stroke-width: 1.5;
    cursor: pointer;
    transition: stroke 0.1s, stroke-width 0.1s;
  }
  .g-node text {
    font-family: 'DM Mono', ui-monospace, monospace;
    pointer-events: none;
    user-select: none;
    paint-order: stroke fill;
    stroke: rgba(14,14,16,0.92);
    stroke-width: 3px;
    stroke-linejoin: round;
  }
  .g-link {
    stroke: #2e2e38;
    stroke-width: 1;
    transition: stroke 0.15s, opacity 0.15s;
  }

  /* Wireframe mode overrides */
  body.wire .g-node circle {
    fill: transparent !important;
    stroke-width: 2 !important;
    stroke-opacity: 0.9 !important;
  }
  body.wire .g-link {
    stroke: #3a3a50;
    stroke-width: 1.2;
    opacity: 0.55 !important;
  }

  /* ── Left panel ───────────────────────────────────────── */
  #graph-panel {
    position: fixed;
    top: 68px; left: 14px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 10; width: 200px;
  }
  #graph-search {
    background: rgba(23,23,26,0.92);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 7px 12px;
    font-size: 12px;
    font-family: inherit;
    width: 100%;
    backdrop-filter: blur(6px);
  }
  #graph-search:focus { outline: none; border-color: var(--accent); }
  #graph-search::placeholder { color: var(--muted); }

  /* ── Legend (clickable) ───────────────────────────────── */
  #graph-legend {
    background: rgba(23,23,26,0.88);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 0;
    backdrop-filter: blur(6px);
    max-height: calc(100vh - 180px);
    overflow-y: auto;
  }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 10px;
    font-size: 11px; color: var(--muted);
    background: transparent; border: none;
    border-radius: 4px;
    cursor: pointer; font-family: inherit;
    width: 100%; text-align: left;
    transition: background 0.12s, color 0.12s;
  }
  .legend-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .legend-item.active { background: rgba(255,255,255,0.07); color: var(--text); }
  .legend-item.active .legend-dot { box-shadow: 0 0 0 2px rgba(255,255,255,0.4); }
  .legend-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    transition: box-shadow 0.12s;
  }

  /* ── Accordion sub-genre panel ─────────────────────────── */
  .family-label { flex: 1; }
  .family-count { font-size: 9px; opacity: 0.32; }
  .family-caret {
    font-size: 8px; opacity: 0.28; margin-left: 3px; flex-shrink: 0;
    transition: transform 0.25s ease;
  }
  .family-section.open .family-caret { transform: rotate(90deg); }
  .family-children {
    overflow: hidden; max-height: 0;
    transition: max-height 0.38s ease;
  }
  .family-section.open .family-children { max-height: 340px; }
  .family-node {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding: 3px 10px 3px 26px;
    font-size: 10px; color: var(--muted);
    background: none; border: none; cursor: pointer;
    text-align: left; font-family: inherit; border-radius: 3px;
  }
  .family-node:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .family-node-count { font-size: 9px; opacity: 0.22; flex-shrink: 0; }
  .family-roots {
    padding: 2px 10px 7px 26px;
    font-size: 9px; color: rgba(255,255,255,0.18); font-style: italic;
  }

  /* ── Tooltip ──────────────────────────────────────────── */
  #graph-tip {
    position: fixed;
    background: rgba(23,23,26,0.96);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    pointer-events: none;
    z-index: 20;
    display: none;
    max-width: 200px;
    backdrop-filter: blur(6px);
  }
  #tip-name  { color: var(--text); font-weight: 600; display: block; margin-bottom: 2px; }
  #tip-meta  { color: var(--muted); font-size: 11px; display: block; }

  /* ── Top-right controls ───────────────────────────────── */
  #view-toggle {
    position: fixed; top: 68px; right: 14px;
    display: flex; gap: 6px; z-index: 10;
  }
  .view-btn {
    background: rgba(23,23,26,0.88);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    padding: 6px 12px; font-size: 11px; font-family: inherit;
    cursor: pointer; backdrop-filter: blur(6px);
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 5px;
    transition: all .15s;
  }
  .view-btn:hover, .view-btn.active { border-color: var(--accent); color: var(--accent); text-decoration: none; }
  body.wire #btn-wire { border-color: var(--accent); color: var(--accent); }

  /* ── Tour — CSS compositor handles all animation, JS just sets targets ── */
  body.touring .g-node circle {
    transition: fill 13s ease-in-out !important;
  }
  body.touring .g-node text {
    transition: opacity 9s ease-in-out !important;
  }
  body.touring .g-link {
    transition: opacity 10s ease-in-out !important;
  }

  /* Legend: solid bg, dim others, pop the active one */
  body.touring #graph-legend {
    background: rgba(14,14,18,0.98);
    backdrop-filter: none;
  }
  body.touring .legend-item {
    opacity: 0.22;
    transition: opacity 2s ease, transform 0.8s ease;
  }
  body.touring .legend-item.active {
    opacity: 1;
    color: var(--text);
    transform: scaleX(1.04);
    transform-origin: left center;
  }
  body.touring .legend-item.active .legend-dot {
    box-shadow: 0 0 7px 2px currentColor;
    transition: box-shadow 1.5s ease;
  }

  /* ── Tour label overlay ──────────────────────────────────────────────── */
  #tour-label {
    position: fixed;
    top: 76px; left: 50%; transform: translateX(-50%);
    background: rgba(14,14,18,0.92);
    border: 1px solid transparent;
    border-radius: 20px;
    padding: 6px 22px;
    font-size: 13px; font-weight: 600; letter-spacing: 0.03em;
    pointer-events: none; z-index: 15;
    opacity: 0;
    transition: opacity 0.8s ease, border-color 1.2s ease, box-shadow 1.2s ease, color 1s ease;
    white-space: nowrap;
    backdrop-filter: blur(8px);
  }
  #tour-label.visible { opacity: 1; }

  @media (max-width: 640px) {
    /* Search bar moves to bottom, full-width — thumb-reachable */
    #graph-panel {
      top: auto;
      bottom: 12px;
      left: 12px;
      right: 12px;
      width: auto;
      flex-direction: row;
      align-items: center;
    }
    #graph-search { flex: 1; min-width: 0; }
    #graph-legend { display: none; }
    /* View buttons stack vertically, icon size */
    #view-toggle { flex-direction: column; gap: 4px; right: 10px; }
    .view-btn { padding: 5px 9px; font-size: 10px; }
  }
</style>
{% endblock %}

{% block content %}
<div id="graph-wrap">
  <svg id="graph-svg"></svg>
</div>

<div id="graph-panel">
  <input id="graph-search" type="text" placeholder="Search genres…" autocomplete="off">
  <div id="graph-legend"></div>
</div>

<div id="view-toggle">
  <a href="{% url 'wiki:token_list' %}" class="view-btn">☰ Tokens</a>
  <a href="{% url 'wiki:genre_tree' %}" class="view-btn">⊕ Tree</a>
  <button id="btn-wire" class="view-btn" onclick="toggleWire()" title="Toggle wireframe">◎ Wire</button>
  <button id="btn-tour" class="view-btn" onclick="toggleTour()" title="Auto-tour genre families">⏵ Tour</button>
  <button class="view-btn active">◉ Graph</button>
  <button class="view-btn" onclick="location.reload(true)" title="Hard reload">↺</button>
</div>

<div id="tour-label"></div>

<div id="graph-tip">
  <span id="tip-name"></span>
  <span id="tip-meta"></span>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
(function () {
  'use strict';

  // ── Color family ────────────────────────────────────────────────────
  function genreColor(name) {
    const n = name.toLowerCase();
    if (/house|techno|trance|electro|synth|rave|ambient|wave|drone|noise|industrial|ebm|idm|glitch|electronica|dubstep|edm/.test(n)) return '#7c6af7';
    if (/hip|hop|rap|trap|drill|grime|boom|bap|crunk|mumble|cloud|gangsta/.test(n)) return '#f59e0b';
    if (/rock|metal|punk|grunge|hardcore|doom|thrash|death|black|shoegaze/.test(n)) return '#ef4444';
    if (/jazz|soul|blues|funk|gospel|swing|bossa|latin|reggae|ska|dub|r&b|rnb/.test(n)) return '#22c55e';
    if (/drum|bass|jungle|neurofunk|liquid|footwork|break/.test(n)) return '#06b6d4';
    if (/pop|indie|alternative|dream|bedroom|chillwave/.test(n)) return '#ec4899';
    if (/folk|world|afro|celtic|country|bluegrass|cumbia|flamenco|bhangra|cumbia/.test(n)) return '#f97316';
    return '#6b7280';
  }

  // Family cluster centers (guide nodes toward loose groupings)
  const FAMILY_CENTERS = {
    '#7c6af7': { x: -180, y: -80  },
    '#f59e0b': { x:  180, y: -80  },
    '#ef4444': { x: -180, y:  80  },
    '#22c55e': { x:    0, y: -200 },
    '#06b6d4': { x:  180, y:  80  },
    '#ec4899': { x:    0, y:  200 },
    '#f97316': { x: -100, y:    0 },
    '#6b7280': { x:  100, y:    0 },
  };

  function nodeR(d) {
    return Math.max(4, Math.min(18, Math.sqrt(d.track_count || 1) * 0.9));
  }

  // ── State ────────────────────────────────────────────────────────────
  let activeLegend = null;
  let activeSearch = '';
  let nodeSel, linkSel;
  let allNodes = [], allLinks = [], simulation;
  const focusSlug = new URLSearchParams(location.search).get('focus');
  // Touch: true on phones/tablets (no hover). First tap highlights, second navigates.
  const isTouch = window.matchMedia('(hover: none)').matches;
  let _tapSlug = null;

  // ── SVG setup ────────────────────────────────────────────────────────
  const svg  = d3.select('#graph-svg');
  const wrap = document.getElementById('graph-wrap');
  let W = wrap.clientWidth, H = wrap.clientHeight;
  const g = svg.append('g').attr('class', 'graph-root');

  const zoom = d3.zoom()
    .scaleExtent([0.1, 8])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);
  svg.call(zoom.transform, d3.zoomIdentity.translate(W / 2, H / 2).scale(0.55));

  // ── Load ─────────────────────────────────────────────────────────────
  fetch("{% url 'wiki:api_graph_data' %}")
    .then(r => r.json())
    .then(data => {
      allNodes = data.nodes;
      allLinks = data.links;
      buildGraph(allNodes, allLinks);
      buildFamilyPanel(allNodes);
      if (focusSlug) {
        setTimeout(() => focusNode(focusSlug), 2800);
      } else {
        setTimeout(() => fitToView(true), 3500);
      }
    });

  // ── Build ─────────────────────────────────────────────────────────────
  function buildGraph(nodes, links) {
    g.selectAll('*').remove();

    linkSel = g.append('g').attr('class', 'links')
      .selectAll('line').data(links).join('line')
      .attr('class', 'g-link')
      .style('opacity', 0.3);

    nodeSel = g.append('g').attr('class', 'nodes')
      .selectAll('g').data(nodes).join('g')
      .attr('class', 'g-node')
      .call(makeDrag())
      .on('click', (e, d) => {
        if (isTouch) {
          e.stopPropagation();
          if (_tapSlug === d.slug) {
            window.location.href = "{{ token_url_base }}" + d.slug + '/';
          } else {
            _tapSlug = d.slug;
            showTip(e, d); moveTip(e);
            highlightNeighborhood(d.slug);
          }
        } else {
          window.location.href = "{{ token_url_base }}" + d.slug + '/';
        }
      })
      .on('mouseover', (e, d) => { if (!isTouch && !tourActive) { showTip(e, d); highlightNeighborhood(d.slug); } })
      .on('mousemove', (e) => { if (!isTouch && !tourActive) moveTip(e); })
      .on('mouseout',  ()  => { if (!isTouch && !tourActive) { hideTip(); if (!activeLegend && !activeSearch) resetHighlight(); else applyHighlight(); } });

    nodeSel.append('circle')
      .attr('r', nodeR)
      .attr('fill', d => genreColor(d.name))
      .attr('fill-opacity', 0.85)
      .attr('stroke', d => genreColor(d.name))
      .attr('stroke-opacity', 0.45);

    nodeSel.append('text')
      .text(d => d.name)
      .attr('x', d => nodeR(d) + 3)
      .attr('y', '0.35em')
      .attr('fill', '#c8c8d8')
      .attr('font-size', d => d.track_count > 500 ? '11px' : '9px')
      .style('display', d => d.track_count > 150 ? null : 'none');

    // Custom family clustering force
    function familyForce(alpha) {
      nodes.forEach(node => {
        const center = FAMILY_CENTERS[genreColor(node.name)];
        if (!center) return;
        node.vx += (center.x - (node.x || 0)) * 0.06 * alpha;
        node.vy += (center.y - (node.y || 0)) * 0.06 * alpha;
      });
    }

    simulation = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(links)
        .id(d => d.slug).distance(70).strength(0.25))
      .force('charge', d3.forceManyBody()
        .strength(d => -45 - nodeR(d) * 5).distanceMax(260))
      .force('center', d3.forceCenter(0, 0).strength(0.04))
      .force('collision', d3.forceCollide(d => nodeR(d) + 4))
      .force('family', familyForce)
      .alphaDecay(0.04)
      .velocityDecay(0.65)
      .on('tick', () => {
        linkSel
          .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
      })
      .on('end', () => {});
  }

  // ── Family accordion panel ────────────────────────────────────────────────
  function buildFamilyPanel(nodes) {
    const legend = document.getElementById('graph-legend');
    legend.innerHTML = '';

    // Bucket nodes by family color
    const famMap = {};
    TOUR_FAMILIES.forEach(f => { famMap[f.color] = { ...f, nodes: [] }; });
    nodes.forEach(n => {
      const c = genreColor(n.name);
      if (famMap[c]) famMap[c].nodes.push(n);
    });

    TOUR_FAMILIES.forEach(fam => {
      const famNodes = famMap[fam.color].nodes
        .slice().sort((a, b) => (b.track_count || 0) - (a.track_count || 0));
      const topNodes = famNodes.slice(0, 8);
      const years = famNodes.map(n => n.origin_year).filter(Boolean);
      const earliestYear = years.length ? Math.min(...years) : null;

      const section = document.createElement('div');
      section.className = 'family-section';
      section.dataset.color = fam.color;

      const header = document.createElement('button');
      header.className = 'legend-item';
      header.dataset.color = fam.color;
      header.innerHTML =
        `<span class="legend-dot" style="background:${fam.color}"></span>` +
        `<span class="family-label">${fam.label}</span>` +
        `<span class="family-count">${famNodes.length}</span>` +
        `<span class="family-caret">&#9654;</span>`;

      header.addEventListener('click', () => {
        const wasOpen = section.classList.contains('open');
        document.querySelectorAll('.family-section').forEach(s => s.classList.remove('open'));
        document.querySelectorAll('.legend-item').forEach(b => b.classList.remove('active'));
        if (!wasOpen) {
          section.classList.add('open');
          header.classList.add('active');
          activeLegend = fam.color;
        } else {
          activeLegend = null;
        }
        activeSearch = '';
        searchInput.value = '';
        applyHighlight();
      });
      section.appendChild(header);

      const children = document.createElement('div');
      children.className = 'family-children';

      topNodes.forEach(n => {
        const btn = document.createElement('button');
        btn.className = 'family-node';
        btn.innerHTML =
          `<span>${n.name}</span>` +
          `<span class="family-node-count">${n.track_count || 0}</span>`;
        btn.addEventListener('click', e => { e.stopPropagation(); focusNode(n.slug); });
        children.appendChild(btn);
      });

      if (earliestYear) {
        const roots = document.createElement('div');
        roots.className = 'family-roots';
        roots.textContent = `born: ${earliestYear}`;
        children.appendChild(roots);
      }

      section.appendChild(children);
      legend.appendChild(section);
    });
  }

  // ── Fit viewport to settled nodes (percentile bounds ignore outliers) ────
  function fitToView(animate) {
    if (!allNodes.length) return;
    const PAD = 60;
    const xs = allNodes.map(n => n.x || 0).sort((a, b) => a - b);
    const ys = allNodes.map(n => n.y || 0).sort((a, b) => a - b);
    const q = (arr, p) => arr[Math.max(0, Math.min(arr.length - 1, Math.floor(arr.length * p)))];
    const x0 = q(xs, 0.02), x1 = q(xs, 0.98);
    const y0 = q(ys, 0.02), y1 = q(ys, 0.98);
    const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
    const scale = Math.min(
      (W - PAD * 2) / Math.max(x1 - x0, 1),
      (H - PAD * 2) / Math.max(y1 - y0, 1),
      3
    );
    const t = d3.zoomIdentity.translate(W / 2, H / 2).scale(scale).translate(-cx, -cy);
    (animate ? svg.transition().duration(900) : svg).call(zoom.transform, t);
  }

  // ── Highlight helpers ─────────────────────────────────────────────────
  function neighborhoodOf(slugs) {
    const set = new Set(slugs);
    linkSel.each(function(l) {
      const s = l.source.slug || l.source;
      const t = l.target.slug || l.target;
      slugs.forEach(sl => {
        if (s === sl) set.add(t);
        if (t === sl) set.add(s);
      });
    });
    return set;
  }

  function setNodeText(node, role) {
    // role: 'focus' | 'neighbor' | 'dim' | 'reset'
    node.select('text')
      .style('display', role === 'dim' ? 'none'
           : role === 'reset' ? (d => d.track_count > 150 ? null : 'none')
           : null)
      .attr('fill', role === 'focus' ? 'white'
          : role === 'neighbor' ? 'var(--text)'
          : '#c8c8d8')
      .attr('font-size', role === 'focus' ? '12px'
          : d => d.track_count > 500 ? '11px' : '9px');
  }

  function highlightNeighborhood(slug) {
    const hood = neighborhoodOf([slug]);
    nodeSel.each(function(n) {
      const sel = d3.select(this);
      const role = n.slug === slug ? 'focus' : hood.has(n.slug) ? 'neighbor' : 'dim';
      sel.select('circle')
        .style('opacity', role === 'dim' ? 0.07 : 1)
        .attr('stroke', role === 'focus' ? 'white' : genreColor(n.name))
        .attr('stroke-width', role === 'focus' ? 3 : 1.5)
        .attr('stroke-opacity', role === 'focus' ? 1 : 0.45);
      setNodeText(sel, role);
    });
    linkSel.style('opacity', l => {
      const s = l.source.slug || l.source, t = l.target.slug || l.target;
      return (s === slug || t === slug) ? 0.85 : 0.03;
    });
  }

  function applyHighlight() {
    if (activeSearch) {
      const matchSlugs = new Set(
        allNodes.filter(n => n.name.toLowerCase().includes(activeSearch)).map(n => n.slug)
      );
      if (matchSlugs.size) {
        const hood = neighborhoodOf([...matchSlugs]);
        nodeSel.each(function(n) {
          const sel  = d3.select(this);
          const role = matchSlugs.has(n.slug) ? 'focus' : hood.has(n.slug) ? 'neighbor' : 'dim';
          sel.select('circle')
            .style('opacity', role === 'dim' ? 0.06 : 1)
            .attr('stroke', role === 'focus' ? 'white' : genreColor(n.name))
            .attr('stroke-width', role === 'focus' ? 2.5 : 1.5)
            .attr('stroke-opacity', role === 'focus' ? 0.9 : 0.45);
          setNodeText(sel, role);
        });
        linkSel.style('opacity', l => {
          const s = l.source.slug || l.source, t = l.target.slug || l.target;
          return hood.has(s) && hood.has(t) ? 0.55 : 0.02;
        });
        return;
      }
    }
    if (activeLegend) {
      nodeSel.each(function(n) {
        const sel    = d3.select(this);
        const active = genreColor(n.name) === activeLegend;
        sel.select('circle')
          .style('opacity', active ? 1 : 0.06)
          .attr('stroke', genreColor(n.name))
          .attr('stroke-width', 1.5)
          .attr('stroke-opacity', active ? 0.7 : 0.3);
        setNodeText(sel, active ? 'focus' : 'dim');
      });
      linkSel.style('opacity', l => {
        const s = l.source.slug || l.source, t = l.target.slug || l.target;
        const sn = allNodes.find(n => n.slug === s), tn = allNodes.find(n => n.slug === t);
        return (sn && genreColor(sn.name) === activeLegend) ||
               (tn && genreColor(tn.name) === activeLegend) ? 0.45 : 0.02;
      });
      return;
    }
    resetHighlight();
  }

  function resetHighlight() {
    nodeSel.each(function() { setNodeText(d3.select(this), 'reset'); });
    nodeSel.select('circle')
      .style('opacity', null)
      .attr('stroke', d => genreColor(d.name))
      .attr('stroke-width', 1.5)
      .attr('stroke-opacity', 0.45);
    linkSel.style('opacity', 0.3);
  }

  // ── Tooltip ───────────────────────────────────────────────────────────
  const tip = document.getElementById('graph-tip');
  function showTip(e, d) {
    document.getElementById('tip-name').textContent = d.name;
    const bpm = d.bpm_min && d.bpm_max ? ` · ${d.bpm_min}–${d.bpm_max} BPM` : '';
    document.getElementById('tip-meta').textContent = (d.track_count || 0) + ' tracks' + bpm;
    tip.style.display = 'block';
  }
  function moveTip(e) {
    if (isTouch) {
      tip.style.left = '50%';
      tip.style.top  = '70px';
      tip.style.transform = 'translateX(-50%)';
    } else {
      tip.style.transform = '';
      tip.style.left = (e.clientX + 14) + 'px';
      tip.style.top  = (e.clientY - 10) + 'px';
    }
  }
  function hideTip() { tip.style.display = 'none'; }

  // ── Search ────────────────────────────────────────────────────────────
  const searchInput = document.getElementById('graph-search');
  searchInput.addEventListener('input', function () {
    activeSearch = this.value.toLowerCase().trim();
    applyHighlight();
  });

  // ── Legend ────────────────────────────────────────────────────────────
  document.querySelectorAll('.legend-item').forEach(btn => {
    btn.addEventListener('click', function () {
      const color = this.dataset.color;
      if (activeLegend === color) {
        activeLegend = null;
        this.classList.remove('active');
      } else {
        document.querySelectorAll('.legend-item').forEach(b => b.classList.remove('active'));
        activeLegend = color;
        this.classList.add('active');
      }
      activeSearch = '';
      searchInput.value = '';
      applyHighlight();
    });
  });

  // ── Focus (from ?focus= param) ────────────────────────────────────────
  function focusNode(slug) {
    const target = allNodes.find(n => n.slug === slug);
    if (!target) return;
    const scale = 2;
    svg.transition().duration(900).call(zoom.transform,
      d3.zoomIdentity
        .translate(W / 2, H / 2)
        .scale(scale)
        .translate(-(target.x || 0), -(target.y || 0))
    );
    // Populate search so the highlight stays sticky on mouse-out
    searchInput.value = target.name;
    activeSearch = target.name.toLowerCase();
    applyHighlight();
  }

  // ── Wireframe toggle ──────────────────────────────────────────────────
  window.toggleWire = function () {
    document.body.classList.toggle('wire');
  };

  // ── Drag ──────────────────────────────────────────────────────────────
  function makeDrag() {
    return d3.drag()
      .on('start', (e, d) => {
        if (!e.active) simulation.alphaTarget(0.15).restart();
        d.fx = d.x; d.fy = d.y;
      })
      .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end',   (e, d) => {
        if (!e.active) simulation.alphaTarget(0);
        d.fx = null; d.fy = null;
      });
  }

  // ── Touch: tap empty canvas to deselect ───────────────────────────────
  if (isTouch) {
    svg.on('click', (e) => {
      if (e.target.tagName === 'svg' || e.target.tagName === 'g') {
        _tapSlug = null;
        hideTip();
        if (!activeLegend && !activeSearch) resetHighlight(); else applyHighlight();
      }
    });
  }

  // ── Resize ────────────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    W = wrap.clientWidth; H = wrap.clientHeight;
  });

  // ── Auto-tour ─────────────────────────────────────────────────────────
  // Ordered by musical lineage — each family shares DNA with its neighbours
  const TOUR_FAMILIES = [
    { color: '#22c55e', label: 'Jazz / Soul' },    // roots
    { color: '#f97316', label: 'World / Folk' },   // roots → diaspora
    { color: '#f59e0b', label: 'Hip-Hop / Rap' },  // soul/funk → hip-hop
    { color: '#06b6d4', label: 'Drum & Bass' },    // hip-hop breaks → jungle → d&b
    { color: '#7c6af7', label: 'Electronic' },     // rave culture bridges d&b
    { color: '#ec4899', label: 'Pop / Indie' },    // electronic → synth-pop → indie
    { color: '#ef4444', label: 'Rock / Metal' },   // indie → alt-rock → metal
    { color: '#6b7280', label: 'Other' },          // catch-all dissolve
  ];
  const TOUR_DWELL    = 20000;  // ms visible per family
  const TOUR_ZOOM_MS  = 16000;  // zoom morph duration (unused while zoom off)
  const TOUR_FADE_MS  = 11000;  // node opacity crossfade
  let tourActive = false, tourIdx = 0, tourTimer = null;
  const tourLabel = document.getElementById('tour-label');
  const tourBtn   = document.getElementById('btn-tour');

  function fitFamily(color) {
    const fam = allNodes.filter(n => genreColor(n.name) === color && n.x != null);
    if (!fam.length) return;
    const PAD = 80;
    const xs = fam.map(n => n.x).sort((a, b) => a - b);
    const ys = fam.map(n => n.y).sort((a, b) => a - b);
    const q  = (arr, p) => arr[Math.max(0, Math.min(arr.length - 1, Math.floor(arr.length * p)))];
    const x0 = q(xs, 0.05), x1 = q(xs, 0.95);
    const y0 = q(ys, 0.05), y1 = q(ys, 0.95);
    const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
    const scale = Math.min(
      (W - PAD * 2) / Math.max(x1 - x0, 1),
      (H - PAD * 2) / Math.max(y1 - y0, 1),
      4.5
    );
    const t = d3.zoomIdentity.translate(W / 2, H / 2).scale(scale).translate(-cx, -cy);
    // Named transition — anonymous hover transitions cannot interrupt this
    svg.transition('tour').duration(TOUR_ZOOM_MS).ease(d3.easeCubicInOut)
      .call(zoom.transform, t);
  }

  function tourMorphHighlight(color) {
    // Drain inactive circles to near-black via fill — all circles stay fully visible.
    // CSS 13s transition does the smooth morph, no D3 timing needed.
    nodeSel.select('circle')
      .style('fill', d => genreColor(d.name) === color ? genreColor(d.name) : '#1c1c26');
    // Text: show labels only for active family
    nodeSel.select('text')
      .style('display', null)
      .style('opacity', d => genreColor(d.name) === color ? '1' : '0');
    // Links: glow for active, nearly invisible for rest
    linkSel.style('opacity', l => {
      const sc = genreColor(l.source.name || '');
      const tc = genreColor(l.target.name || '');
      return (sc === color || tc === color) ? '0.5' : '0.03';
    });
  }

  function tourMorphReset() {
    // body.touring removed before this call — no CSS transitions, instant reset
    nodeSel.select('circle').style('fill', null).style('opacity', null);
    nodeSel.select('text').style('opacity', null).style('display', d => d.track_count > 150 ? null : 'none');
    linkSel.style('opacity', '0.3');
  }

  function tourStep() {
    if (!tourActive) return;
    const fam = TOUR_FAMILIES[tourIdx];
    tourIdx = (tourIdx + 1) % TOUR_FAMILIES.length;

    // Label: fade out, swap, fade in
    tourLabel.classList.remove('visible');
    setTimeout(() => {
      tourLabel.textContent = fam.label;
      tourLabel.style.color = fam.color;
      tourLabel.style.borderColor = fam.color + '55';
      tourLabel.style.boxShadow   = `0 0 18px ${fam.color}33`;
      tourLabel.classList.add('visible');
    }, 700);

    // Sync legend chip + accordion
    activeLegend = fam.color;
    activeSearch = '';
    searchInput.value = '';
    document.querySelectorAll('.legend-item').forEach(b => {
      b.classList.toggle('active', b.dataset.color === fam.color);
    });
    document.querySelectorAll('.family-section').forEach(s => {
      s.classList.toggle('open', s.dataset.color === fam.color);
    });

    // Smooth crossfade — user controls zoom
    tourMorphHighlight(fam.color);

    tourTimer = setTimeout(tourStep, TOUR_DWELL);
  }

  window.toggleTour = function () {
    if (tourActive) {
      tourActive = false;
      clearTimeout(tourTimer);
      tourBtn.classList.remove('active');
      tourBtn.textContent = '⏵ Tour';
      tourLabel.classList.remove('visible');
      document.body.classList.remove('touring'); // remove before reset so snap is instant
      activeLegend = null;
      activeSearch = '';
      document.querySelectorAll('.legend-item').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.family-section').forEach(s => s.classList.remove('open'));
      tourMorphReset();
      fitToView(true);
    } else {
      tourActive = true;
      tourIdx = 0;
      tourBtn.classList.add('active');
      tourBtn.textContent = '⏹ Stop';
      // Pre-set inline styles before body.touring so CSS transitions have explicit starting values
      if (nodeSel) {
        nodeSel.select('circle').style('fill', d => genreColor(d.name));
        nodeSel.select('text').style('display', null).style('opacity', '0');
        linkSel.style('opacity', '0.03');
      }
      document.body.classList.add('touring');
      tourStep();
    }
  };
})();
</script>
{% endblock %}
