<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Genre Wiki{% endblock %} — Community Playlist</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0e0e10;
      --surface: #17171a;
      --border:  #2a2a30;
      --text:    #e8e8ec;
      --muted:   #6b6b7a;
      --accent:  #7c6af7;
      --green:   #22c55e;
      --red:     #ef4444;
      --gold:    #eab308;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', ui-monospace, monospace;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 24px;
    }

    header .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
    }

    header nav { display: flex; gap: 16px; font-size: 12px; }
    header nav a { color: var(--muted); }
    header nav a:hover { color: var(--text); }

    header .search-form { margin-left: auto; display: flex; gap: 6px; }
    header .search-form input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: 5px 10px;
      font-size: 12px;
      font-family: inherit;
      width: 200px;
    }
    header .search-form input:focus { outline: none; border-color: var(--accent); }

    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      color: var(--text);
    }
    .chip.accent { border-color: var(--accent); color: var(--accent); }
    .chip.muted  { color: var(--muted); }

    .source-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    .source-table th { text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 6px 10px; border-bottom: 1px solid var(--border); }
    .source-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .source-table tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge.verified  { background: rgba(34,197,94,0.15);  color: var(--green); }
    .badge.consensus { background: rgba(124,106,247,0.15); color: var(--accent); }
    .badge.derived   { background: rgba(107,107,122,0.15); color: var(--muted); }
    .badge.proposed  { background: rgba(234,179,8,0.15);   color: var(--gold); }

    h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
    h2 { font-size: 16px; font-weight: 600; margin: 28px 0 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    p  { color: var(--muted); margin-bottom: 12px; }

    footer {
      border-top: 1px solid var(--border);
      padding: 20px 24px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 60px;
    }
    footer a { color: var(--muted); }
    footer a:hover { color: var(--accent); }

    /* ── Genre track list + mini player ─────────────────────── */
    .wiki-track-list { margin-top: 8px; }
    .wiki-track-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid var(--border);
    }
    .wiki-track-row:last-of-type { border-bottom: none; }
    .wiki-play-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 28px; height: 28px; border-radius: 4px;
      cursor: pointer; font-size: 10px; flex-shrink: 0;
      font-family: monospace; transition: all .15s;
    }
    .wiki-play-btn:hover, .wiki-play-btn.wiki-active {
      border-color: var(--accent); color: var(--accent);
    }
    .wiki-track-info { flex: 1; min-width: 0; }
    .wiki-track-title { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wiki-track-meta  { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .wiki-track-link  { font-size: 11px; color: var(--muted); flex-shrink: 0; }
    .wiki-track-link:hover { color: var(--accent); }
    .wiki-queue-btn {
      margin-top: 14px;
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); border-radius: 4px; padding: 6px 14px;
      font-size: 12px; font-family: inherit; cursor: pointer; transition: all .15s;
    }
    .wiki-queue-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Sticky mini player bar ──────────────────────────────── */
    #wiki-player-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #0a0a0c; border-top: 1px solid var(--border);
      padding: 10px 20px; z-index: 999;
      align-items: center; gap: 14px;
      font-size: 12px;
    }
    #wiki-player-yt { width: 0; height: 0; overflow: hidden; }
    .wiki-player-info { flex: 1; min-width: 0; }
    #wiki-player-title  { color: var(--text); font-weight: 600; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #wiki-player-artist { color: var(--muted); font-size: 11px; display: block; }
    .wiki-player-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .wiki-player-btns button {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); width: 30px; height: 30px;
      border-radius: 4px; cursor: pointer; font-size: 11px;
      font-family: monospace; transition: all .15s;
    }
    .wiki-player-btns button:hover { border-color: var(--accent); color: var(--accent); }
    body.wiki-player-open { padding-bottom: 60px; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<header>
  <a href="{% url 'wiki:token_list' %}" class="logo">Genre Wiki</a>
  <nav>
    <a href="{% url 'wiki:token_list' %}">Tokens</a>
    <a href="{% url 'wiki:genre_graph' %}">◉ Graph</a>
    <a href="{% url 'wiki:genre_tree' %}">⊕ Tree</a>
    <a href="https://communityplaylist.com">← Community Playlist</a>
  </nav>
  <form class="search-form" action="{% url 'wiki:token_list' %}" method="get">
    <input name="q" value="{{ q|default:'' }}" placeholder="Search tokens, genres…" autocomplete="off">
  </form>
</header>

<div class="container">
  {% block content %}{% endblock %}
</div>

<footer>
  Built from <a href="https://communityplaylist.com/artists/binsky/" target="_blank" rel="noopener">Binsky's</a> library · <a href="https://communityplaylist.com" target="_blank" rel="noopener">Community Playlist</a>
  — Portland, OR
</footer>

</body>
</html>
